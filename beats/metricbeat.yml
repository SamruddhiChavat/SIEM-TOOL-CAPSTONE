metricbeat.modules:
  # System resource monitoring (CPU, Memory, Disk, Network, Processes)
  - module: system
    metricsets:
      - cpu
      - load
      - memory
      - network
      - process
      - process_summary
      - core
      - diskio
      - socket
      - filesystem
      - fsstat
    enabled: true
    period: 10s
    processes: ['.*']
    cpu.metrics: ["percentages", "normalized_percentages"]
    core.metrics: ["percentages"]

# Collect from Docker containers running on this host
  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - info
      - memory
      - network
    hosts: ["unix:///var/run/docker.sock"]
    period: 15s
    enabled: true

processors:
  - add_host_metadata: ~

# Ship to SIEM Logstash on 192.168.1.4
output.logstash:
  hosts: ["192.168.1.4:5044"]

logging.level: info
