input {
  tcp {
    port => 5055
    type => "auth_logs"
  }
}

filter {
  if [type] == "auth_logs" {
    # Grok pattern specifically tuned for sshd and sudo auth attempts
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
    }
    
    if [syslog_program] == "sshd" {
      grok {
        match => { "syslog_message" => [
          "Failed %{WORD:ssh_auth_method} for (invalid user )?%{USER:ssh_user} from %{IP:source_ip} port %{POSINT:ssh_port} %{WORD:ssh_protocol}",
          "Accepted %{WORD:ssh_auth_method} for %{USER:ssh_user} from %{IP:source_ip} port %{POSINT:ssh_port} %{WORD:ssh_protocol}",
          "Disconnected from (invalid user )?%{USER:ssh_user} %{IP:source_ip} port %{POSINT:ssh_port}"
        ] }
      }
      
      if "Failed" in [syslog_message] {
        mutate { add_tag => ["auth_failure", "sshd_failure", "siem_detected_event"] }
      } else if "Accepted" in [syslog_message] {
        mutate { add_tag => ["auth_success", "sshd_success", "siem_detected_event"] }
      }
    }
    
    if [syslog_program] == "sudo" {
      grok {
        match => { "syslog_message" => ".*%{USER:sudo_user} : TTY=.* ; PWD=.* ; USER=%{USER:target_user} ; COMMAND=%{GREEDYDATA:sudo_command}"}
      }
      if [target_user] == "root" {
        mutate { add_tag => ["privilege_escalation_attempt", "siem_detected_event"] }
      }
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
    }
    
    # Tagging important fields to sync up with Wazuh-like SIEM mapping
    mutate {
      rename => { "source_ip" => "src_ip" }
      rename => { "ssh_user" => "user" }
    }
  }
}

output {
  if [type] == "auth_logs" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-logs-auth-%{+YYYY.MM.dd}"
    }
  }
}
