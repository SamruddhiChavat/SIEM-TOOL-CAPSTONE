filter {
  # Generic matching for pfSense, iptables, or UFW logs sent over syslog
  if "firewall" in [tags] or "iptables" in [message] or "UFW" in [message] {
    mutate {
      add_tag => ["firewall_traffic"]
      add_field => { "siem_source" => "firewall" }
    }

    # Grok pattern for typical iptables/UFW drop log
    grok {
      match => { "message" => ".*%{WORD:action} IN=%{WORD:in_interface}? OUT=%{WORD:out_interface}? MAC=%{DATA:mac} SRC=%{IP:source_ip} DST=%{IP:destination_ip} .* LEN=%{NUMBER:length} .* PROTO=%{WORD:protocol} .* DPT=%{NUMBER:destination_port} .*" }
    }

    if [action] =~ /DROP/ or [action] =~ /BLOCK/ or [action] =~ /DENY/ {
      mutate {
        add_tag => ["connection_blocked"]
        add_field => {
          "mitre.tactic" => "Initial Access"
          "mitre.technique_id" => "T1133"
          "mitre.technique_name" => "External Remote Services"
          "risk_score" => 15
        }
      }
    }

    if [source_ip] and [source_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/ {
      geoip {
        source => "source_ip"
        target => "source.geo"
      }
    }
  }
}

output {
  if "firewall_traffic" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-logs-firewall-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }
}
