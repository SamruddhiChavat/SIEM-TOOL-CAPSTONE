input {
  # Real-time Syslog from Linux/Mac machines on 192.168.1.0/24
  syslog {
    port => 5140
    type => "syslog"
    tags => ["siem_detected_event"]
  }

  # TCP syslog for more reliable delivery (some devices prefer TCP)
  tcp {
    port => 5140
    type => "syslog_tcp"
    codec => "plain"
    tags => ["siem_detected_event"]
  }

  # Filebeat / Auth logs from Linux endpoints on the network
  beats {
    port => 5055
    type => "syslog"
    tags => ["siem_detected_event"]
  }
}

filter {
  if [type] == "syslog" or [type] == "syslog_tcp" or [event][module] == "system" {
    mutate {
      add_tag => ["linux_syslog"]
      add_field => { "siem_source" => "linux" }
    }

    # Detect SSH Brute Force / Failures
    if "sshd" in [process][name] or "sshd" in [program] {
      if "Failed password" in [message] {
        mutate {
          add_tag => ["sshd_failed"]
          add_field => {
            "mitre.tactic" => "Credential Access"
            "mitre.technique_id" => "T1110"
            "mitre.technique_name" => "Brute Force"
            "risk_score" => 30
          }
        }
        grok {
          match => { "message" => "Failed password for (invalid user )?%{USER:username} from %{IP:source_ip} port %{NUMBER:port} %{WORD:protocol}" }
          tag_on_failure => []
        }
      }
      else if "Accepted password" in [message] or "Accepted publickey" in [message] {
        mutate {
          add_tag => ["sshd_success"]
          add_field => {
            "mitre.tactic" => "Initial Access"
            "mitre.technique_id" => "T1078.003"
            "mitre.technique_name" => "Local Accounts"
            "risk_score" => 5
          }
        }
        grok {
          match => { "message" => "Accepted %{WORD:auth_method} for %{USER:username} from %{IP:source_ip} port %{NUMBER:port} %{WORD:protocol}" }
          tag_on_failure => []
        }
      }
    }

    # Detect sudo usage
    if "sudo" in [process][name] or "sudo" in [program] {
      mutate {
        add_tag => ["sudo_usage"]
        add_field => {
          "mitre.tactic" => "Privilege Escalation"
          "mitre.technique_id" => "T1548.003"
          "mitre.technique_name" => "Sudo and Sudo Caching"
          "risk_score" => 20
        }
      }
    }

    # Add GeoIP for external IPs
    if [source_ip] {
      geoip {
        source => "source_ip"
        target => "geo"
      }
    }
  }
}

output {
  if "linux_syslog" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-logs-linux-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }
}
