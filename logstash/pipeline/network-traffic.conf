input {
  beats {
    port => 5044
    type => "network"
    tags => ["siem_detected_event"]
  }
}

filter {
  if [type] == "network" or [event][module] == "netflow" {
    mutate {
      add_tag => ["network_traffic"]
      add_field => { "siem_source" => "network" }
    }

    # Flag large data transfers (potential exfiltration)
    if [network][bytes] and [network][bytes] > 50000000 {
      mutate {
        add_tag => ["large_transfer"]
        add_field => {
          "mitre.tactic" => "Exfiltration"
          "mitre.technique_id" => "T1048"
          "mitre.technique_name" => "Exfiltration Over Alternative Protocol"
          "risk_score" => 70
        }
      }
    }

    # Flag RDP to external
    if [destination][port] == 3389 {
      if [destination][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/ {
        mutate {
          add_tag => ["rdp_external"]
          add_field => {
            "mitre.tactic" => "Command and Control"
            "mitre.technique_id" => "T1071"
            "risk_score" => 65
          }
        }
      }
    }

    # Flag DNS queries that are too long (DNS tunneling)
    if [dns][question][name] and [dns][question][name] =~ /.{50,}/ {
      mutate {
        add_tag => ["dns_tunnel_suspected"]
        add_field => {
          "mitre.tactic" => "Exfiltration"
          "mitre.technique_id" => "T1048.003"
          "risk_score" => 60
        }
      }
    }

    # GeoIP for all network events
    if [source][ip] {
      geoip {
        source => "[source][ip]"
        target => "source_geo"
      }
    }
    if [destination][ip] {
      geoip {
        source => "[destination][ip]"
        target => "destination_geo"
      }
    }
  }
}

output {
  if "network_traffic" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-logs-network-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }
}
