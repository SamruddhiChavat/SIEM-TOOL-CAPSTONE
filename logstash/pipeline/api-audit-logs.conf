input {
  tcp {
    port => 5060
    type => "api_audit_logs"
    codec => json
  }
}

filter {
  if [type] == "api_audit_logs" {
    # JSON events parsed directly via codec
    
    # Example logic for parsing suspicious API interactions like unauthorized drops
    if [response_status] >= 400 {
      mutate { add_tag => ["api_error"] }
      
      if [response_status] == 401 or [response_status] == 403 {
        mutate { add_tag => ["api_auth_failure", "siem_detected_event"] }
      }
    }
    
    # Track heavy payload exfiltration
    if [bytes_sent] and [bytes_sent] > 10000000 {
      mutate { add_tag => ["massive_data_transfer", "siem_detected_event"] }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  if [type] == "api_audit_logs" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-logs-api-%{+YYYY.MM.dd}"
    }
  }
}
