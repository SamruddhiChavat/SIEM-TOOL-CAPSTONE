# SecureWatch Agent Configuration
# ────────────────────────────────

agent:
  name: "securewatch-agent"
  group: "default"
  id: null              # Auto-assigned on registration
  token: null           # Auto-assigned on registration
  heartbeat_interval: 30   # seconds between heartbeats
  poll_interval: 5         # seconds between collector polls
  log_level: "INFO"

# Manager server connection
server:
  host: "192.168.1.4"    # SecureWatch Manager IP
  port: 1514             # Manager TCP port
  protocol: "tcp"        # tcp or tls
  tls_verify: false

# Collector modules
modules:
  syslog_collector:
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
      - /var/log/secure
      - /var/log/messages

  process_monitor:
    enabled: true
    interval: 10
    suspicious_parents:
      - "WINWORD.EXE"
      - "EXCEL.EXE"
      - "POWERPNT.EXE"
    suspicious_children:
      - "cmd.exe"
      - "powershell.exe"
      - "wscript.exe"
      - "cscript.exe"
      - "mshta.exe"

  network_monitor:
    enabled: true
    interval: 15
    alert_on_ports: [4444, 5555, 8888, 1337]
    large_transfer_threshold_mb: 100

  file_integrity_monitor:
    enabled: true
    paths:
      linux:
        - /etc/passwd
        - /etc/shadow
        - /etc/sudoers
        - /etc/ssh/sshd_config
        - /etc/crontab
        - /usr/bin
        - /usr/sbin
        - /bin
        - /sbin
      windows:
        - C:\Windows\System32
        - C:\Windows\SysWOW64
        - C:\Windows\System32\drivers
    interval: 60
    hash_algorithm: sha256

  vulnerability_scanner:
    enabled: true
    interval: 3600      # scan every hour
    nvd_feed_path: "/var/lib/securewatch/nvd"

  rootkit_detector:
    enabled: true
    interval: 300       # scan every 5 minutes
    check_hidden_processes: true
    check_hidden_files: true
    check_kernel_modules: true
    suspicious_dirs:
      - /tmp
      - /dev/shm

  compliance_checker:
    enabled: true
    interval: 3600
    frameworks:
      - cis_linux
      - cis_windows
    policy_paths:
      - config/policies/linux_cis_benchmark.yml
      - config/policies/windows_cis_benchmark.yml
