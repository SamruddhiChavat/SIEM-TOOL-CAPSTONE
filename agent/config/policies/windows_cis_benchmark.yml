policy_id: "cis_windows_l1"
name: "CIS Windows Benchmarks Level 1"
description: "Security configuration checks for Windows."
checks:
  - id: "CIS-18.4.1"
    title: "Ensure Automatic Updates are enabled"
    description: "Windows should automatically download and install updates."
    command: "(Get-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU' -Name 'NoAutoUpdate' -ErrorAction SilentlyContinue).NoAutoUpdate"
    condition: "equals"
    expected: "0"
    remediation: "Enable Windows Updates"
    
  - id: "CIS-2.3.1.5"
    title: "Ensure 'Minimum password length' is set to 14 or more"
    description: "Require strong passwords."
    command: "net accounts | Select-String -Pattern 'Minimum password length' | ForEach-Object { ($_.ToString() -split ':\\s+')[1] }"
    condition: "equals"
    expected: "14"
    remediation: "Update Local Security Policy -> Minimum password length"
