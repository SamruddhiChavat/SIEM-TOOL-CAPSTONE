policy_id: "cis_linux_level1"
name: "CIS Ubuntu Linux Benchmark Level 1"
description: "Security configuration checks for Ubuntu based on CIS Benchmark."
checks:
  - id: "CIS-1.1.2"
    title: "Ensure /tmp is configured"
    description: "The /tmp directory should be mounted as a separate partition."
    command: "mount | grep /tmp | wc -l"
    condition: "not_equals"
    expected: "0"
    remediation: "Configure /etc/fstab to mount /tmp"
    
  - id: "CIS-4.2.1.2"
    title: "Ensure rsyslog Service is enabled"
    description: "Ensure that logging is active."
    command: "systemctl is-enabled rsyslog"
    condition: "equals"
    expected: "enabled"
    remediation: "Run systemctl enable rsyslog"
    
  - id: "CIS-5.2.4"
    title: "Ensure SSH Protocol is set to 2"
    description: "SSH protocol 1 is insecure."
    command: "grep -E '^Protocol' /etc/ssh/sshd_config | awk '{print $2}'"
    condition: "equals"
    expected: "2"
    remediation: "Edit /etc/ssh/sshd_config to Protocol 2"
