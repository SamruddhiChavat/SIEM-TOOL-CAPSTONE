server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so browsers always get the latest JS bundle reference
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # SPA fallback — all non-file, non-API paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (safe — hash changes when content changes)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/sandbox/* → python backend
    location /api/sandbox/ {
        proxy_pass         http://backend:8000/api/sandbox/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Proxy /api/* → relay server (SSE attack log stream)
    location /api/ {
        proxy_pass         http://relay:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
