# SecureWatch Manager Configuration
server:
  listen_host: "0.0.0.0"
  listen_port: 1514
  api_port: 1515
  max_connections: 256
  tls_enabled: false
  tls_cert_path: "/app/certs/server.crt"
  tls_key_path: "/app/certs/server.key"
  tls_ca_path: "/app/certs/ca.crt"

database:
  url: "${POSTGRES_URL}"
  pool_size: 10

elasticsearch:
  hosts: "${ELASTICSEARCH_HOSTS}"
  index_prefix: "securewatch"
  bulk_size: 500
  flush_interval: 5

redis:
  url: "${REDIS_URL}"

agent_defaults:
  heartbeat_timeout: 90
  disconnect_timeout: 300
  max_event_batch: 1000

logging:
  level: "INFO"
  format: "{time} | {level} | {module}:{function}:{line} | {message}"
