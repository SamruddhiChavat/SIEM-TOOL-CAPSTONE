rule_id: "SIEM-052"
name: "Credential Dumping via Mimikatz"
severity: "critical"
description: "Detects process access to LSASS memory, indicative of Mimikatz or similar credential dumping tools."
mitre:
  tactic: "Credential Access"
  technique_id: "T1003.001"
  technique_name: "LSASS Memory"
logic:
  type: composite
  operator: OR
  conditions:
    - field: "process"
      condition: "contains"
      value: "mimikatz"
    - field: "command_line"
      condition: "regex"
      value: "sekurlsa|lsadump|kerberos::list"
    - field: "message"
      condition: "contains"
      value: "lsass.exe"
suppression: 120
