rule_id: "SIEM-055"
name: "Cron Job Modification Detected"
severity: "high"
description: "Changes to crontab files, potentially establishing persistence."
mitre:
  tactic: "Persistence"
  technique_id: "T1053.003"
  technique_name: "Cron"
logic:
  type: composite
  operator: AND
  conditions:
    - field: "file.path"
      condition: "regex"
      value: "crontab|/etc/cron"
    - field: "file.action"
      condition: "regex"
      value: "create|modify|write"
suppression: 600
